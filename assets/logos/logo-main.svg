<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffca28"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="512" cy="300" r="90" fill="url(#sun)"/>
  <!-- Sun rays -->
  <g opacity="0.6" stroke="#ffca28" stroke-width="6" stroke-linecap="round">
    <line x1="512" y1="180" x2="512" y2="150"/>
    <line x1="512" y1="420" x2="512" y2="450"/>
    <line x1="392" y1="300" x2="362" y2="300"/>
    <line x1="632" y1="300" x2="662" y2="300"/>
    <line x1="427" y1="215" x2="406" y2="194"/>
    <line x1="597" y1="385" x2="618" y2="406"/>
    <line x1="597" y1="215" x2="618" y2="194"/>
    <line x1="427" y1="385" x2="406" y2="406"/>
  </g>
  <!-- Mountains -->
  <polygon points="200,580 400,350 600,580" fill="#2e7d32" opacity="0.85"/>
  <polygon points="420,580 620,380 820,580" fill="#388e3c" opacity="0.75"/>
  <polygon points="320,580 500,420 680,580" fill="#43a047" opacity="0.65"/>
  <!-- Water waves -->
  <path d="M100,620 Q200,590 300,620 Q400,650 500,620 Q600,590 700,620 Q800,650 900,620 L924,620 L924,750 Q700,720 512,750 Q300,720 100,750 Z" fill="url(#water)" opacity="0.8"/>
  <path d="M100,660 Q250,630 400,660 Q550,690 700,660 Q850,630 924,660 L924,780 Q700,760 512,780 Q300,760 100,780 Z" fill="#0288d1" opacity="0.6"/>
  <!-- Fishing hook -->
  <path d="M512,420 L512,620" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M512,620 Q512,700 460,700 Q408,700 408,650" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Hook barb -->
  <line x1="408" y1="650" x2="430" y2="670" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <!-- Float/bobber -->
  <ellipse cx="512" cy="520" rx="14" ry="28" fill="#ff5722"/>
  <ellipse cx="512" cy="510" rx="14" ry="18" fill="#ff7043"/>
  <!-- Fish jumping -->
  <g transform="translate(680,480) rotate(-20)">
    <ellipse cx="0" cy="0" rx="50" ry="25" fill="#fdd835"/>
    <polygon points="45,-15 75,0 45,15" fill="#fdd835"/>
    <circle cx="-20" cy="-8" r="5" fill="#333"/>
    <!-- Scale pattern -->
    <path d="M-10,-5 Q0,-15 10,-5 Q20,-15 30,-5" stroke="#f9a825" stroke-width="2" fill="none"/>
    <path d="M-10,5 Q0,-5 10,5 Q20,-5 30,5" stroke="#f9a825" stroke-width="2" fill="none"/>
  </g>
  <!-- Water splashes near fish -->
  <g opacity="0.7" fill="#b3e5fc">
    <circle cx="650" cy="520" r="6"/>
    <circle cx="670" cy="540" r="4"/>
    <circle cx="710" cy="510" r="5"/>
    <circle cx="720" cy="535" r="3"/>
  </g>
  <!-- Text: 渔乐 -->
  <text x="512" y="870" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="120" font-weight="700" fill="#ffffff" letter-spacing="16">渔乐</text>
  <!-- Subtitle -->
  <text x="512" y="930" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="36" fill="#b3e5fc" letter-spacing="8">周末垂钓 · 轻松出行</text>
</svg>
