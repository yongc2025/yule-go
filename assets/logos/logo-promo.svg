<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="promobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d47a1"/>
      <stop offset="50%" style="stop-color:#1565c0"/>
      <stop offset="100%" style="stop-color:#1976d2"/>
    </linearGradient>
    <linearGradient id="promowater" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#81d4fa"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" rx="20" fill="url(#promobg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="120" fill="#ffffff" opacity="0.04"/>
  <circle cx="1100" cy="320" r="80" fill="#ffffff" opacity="0.03"/>
  <circle cx="100" cy="350" r="60" fill="#ffffff" opacity="0.03"/>
  <!-- Left scene -->
  <!-- Sun -->
  <circle cx="150" cy="100" r="45" fill="#ffca28" opacity="0.9"/>
  <g opacity="0.4" stroke="#ffca28" stroke-width="3" stroke-linecap="round">
    <line x1="150" y1="35" x2="150" y2="22"/>
    <line x1="150" y1="165" x2="150" y2="178"/>
    <line x1="85" y1="100" x2="72" y2="100"/>
    <line x1="215" y1="100" x2="228" y2="100"/>
  </g>
  <!-- Mountains -->
  <polygon points="30,260 100,140 170,260" fill="#2e7d32" opacity="0.7"/>
  <polygon points="110,260 180,160 250,260" fill="#388e3c" opacity="0.6"/>
  <!-- Water -->
  <path d="M0,280 Q60,262 120,280 Q180,298 240,280 Q300,262 360,280 L360,340 Q200,325 100,340 Q40,330 0,340 Z" fill="url(#promowater)" opacity="0.7"/>
  <!-- Hook -->
  <line x1="150" y1="170" x2="150" y2="290" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  <path d="M150,290 Q150,330 125,330 Q100,330 100,305" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Bobber -->
  <ellipse cx="150" cy="235" rx="7" ry="14" fill="#ff5722"/>
  <!-- Jumping fish -->
  <g transform="translate(250,220) rotate(-25)">
    <ellipse cx="0" cy="0" rx="28" ry="14" fill="#fdd835"/>
    <polygon points="24,-9 44,0 24,9" fill="#fdd835"/>
    <circle cx="-10" cy="-4" r="3" fill="#333"/>
  </g>
  <!-- Water splashes -->
  <g opacity="0.6" fill="#b3e5fc">
    <circle cx="230" cy="250" r="4"/>
    <circle cx="245" cy="262" r="3"/>
    <circle cx="270" cy="245" r="3.5"/>
  </g>
  <!-- Main text -->
  <text x="420" y="160" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="110" font-weight="800" fill="#ffffff" letter-spacing="12">渔乐</text>
  <!-- English -->
  <text x="424" y="200" font-family="'Montserrat','Poppins','Helvetica Neue',sans-serif" font-size="28" font-weight="300" fill="#90caf9" letter-spacing="10">YULE GO</text>
  <!-- Divider -->
  <line x1="420" y1="218" x2="720" y2="218" stroke="#42a5f5" stroke-width="2" opacity="0.5"/>
  <!-- Tagline -->
  <text x="424" y="260" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="30" fill="#b3e5fc" letter-spacing="4">周末垂钓 · 轻松出行</text>
  <!-- Feature tags -->
  <g font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="16" fill="#90caf9">
    <rect x="420" y="285" width="100" height="32" rx="16" fill="#1976d2" stroke="#42a5f5" stroke-width="1"/>
    <text x="470" y="306" text-anchor="middle" fill="#e3f2fd">🎣 垂钓团</text>
    <rect x="535" y="285" width="100" height="32" rx="16" fill="#1976d2" stroke="#42a5f5" stroke-width="1"/>
    <text x="585" y="306" text-anchor="middle" fill="#e3f2fd">🏕️ 露营</text>
    <rect x="650" y="285" width="110" height="32" rx="16" fill="#1976d2" stroke="#42a5f5" stroke-width="1"/>
    <text x="705" y="306" text-anchor="middle" fill="#e3f2fd">👨‍👩‍👧 亲子游</text>
    <rect x="775" y="285" width="110" height="32" rx="16" fill="#1976d2" stroke="#42a5f5" stroke-width="1"/>
    <text x="830" y="306" text-anchor="middle" fill="#e3f2fd">👴 慢游团</text>
  </g>
  <!-- Right decorative fish -->
  <g transform="translate(980,200) scale(1.5)" opacity="0.15">
    <ellipse cx="0" cy="0" rx="60" ry="30" fill="#fff"/>
    <polygon points="50,-20 90,0 50,20" fill="#fff"/>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="370" width="1200" height="30" rx="0 0 20 20" fill="#0d47a1"/>
  <text x="600" y="391" text-anchor="middle" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#64b5f6" letter-spacing="6">渔具店 × 周末短途旅行 · 数字化运营平台</text>
</svg>
